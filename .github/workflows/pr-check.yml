name: PR Check

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  check:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run check

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
